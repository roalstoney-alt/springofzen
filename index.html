<!doctype html>
<html lang="en">
<head>
  <title>SpringOfZen - Threshold</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="A threshold space with quiet doors for listening, looking, study, craft, and return.">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/home.css">
  <link rel="stylesheet" href="assets/css/threshold-space.css">
</head>
<body data-page="home">
  <div class="threshold-shell">
    <div class="threshold-world" aria-hidden="true">
      <video class="threshold-video" src="output_10min_smooth.mp4" autoplay muted loop playsinline></video>
      <div class="threshold-lake"></div>
      <div class="threshold-inn"></div>
      <div class="threshold-lamp"></div>
      <div class="threshold-window"></div>
      <div class="threshold-mist"></div>
      <div class="threshold-grain"></div>
    </div>

    <header class="site-header threshold-nav">
      <a class="threshold-logo" href="index.html">SpringOfZen</a>
      <nav class="threshold-links" aria-label="Quiet paths">
        <a href="sessions.html">Sound</a>
        <a href="observatory.html">Observatory</a>
        <a href="journal.html">Journal</a>
      </nav>
    </header>

    <main class="threshold-main">
      <section id="threshold" class="threshold-screen" aria-labelledby="thresholdWhisper">
        <p id="thresholdWhisper" class="threshold-whisper">No need to explain why you came.</p>
        <div class="threshold-doors" data-threshold-doors aria-label="Choose a door"></div>
        <button id="soundBtn" class="roomtone-button" type="button" aria-pressed="false">Listen to the room</button>
      </section>

      <section id="observation" class="threshold-page observation-leaf" aria-labelledby="observationTitle">
        <p class="page-kicker">One sentence</p>
        <blockquote id="observationTitle">
          AI can give us time.<br><br>
          But it cannot tell us<br>
          what to do with the silence.
        </blockquote>
      </section>

      <section id="harbor-note" class="threshold-page desk-note" aria-labelledby="noteTitle">
        <div class="note-card-surface">
          <h2 id="noteTitle">Leave a note for the room.</h2>
          <p>A few words are enough.</p>
          <form id="harborNoteForm" class="minimal-paper-form" data-harbor-note>
            <label>
              <span>What did this place feel like?</span>
              <input name="first_impression" type="text" placeholder="One word..." class="line-input">
            </label>
            <fieldset class="return-field">
              <legend>Would you return?</legend>
              <input type="radio" id="ret-yes" name="would_return" value="yes">
              <label for="ret-yes">Yes</label>
              <input type="radio" id="ret-no" name="would_return" value="no">
              <label for="ret-no">No</label>
            </fieldset>
            <label>
              <span>What should become quieter, warmer, or more alive?</span>
              <textarea name="what_should_change" placeholder="Write freely..." class="line-textarea"></textarea>
            </label>
            <button type="submit" class="paper-submit">Leave Note</button>
            <p class="form-status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/tracking.js"></script>
  <script src="assets/js/threshold-space.js"></script>
</body>
</html>
